<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backlink Creator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #f3e8ff, #e0f2fe); min-height: 100vh; }
    .box { min-height: 520px; resize: vertical; overflow-y: auto; font-family: ui-monospace, monospace; font-size: 14px; line-height: 1.65; }
  </style>
</head>
<body class="p-8">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-2 text-purple-700">Backlink Creator</h1>
    <p class="text-center text-gray-600 mb-8">Input sites → Generate clean backlink URLs (one per line)</p>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- INPUT -->
      <div class="bg-white rounded-2xl shadow-xl p-6">
        <h2 class="font-semibold text-lg mb-3">📥 Input Opportunity URLs (one per line)</h2>
        <textarea id="inputUrls" class="box w-full p-5 border border-gray-300 rounded-2xl" 
          placeholder="https://100printswith.me&#10;https://4imprint.com&#10;https://accessnewswire.com"></textarea>

        <div class="mt-6">
          <label class="block text-sm font-medium mb-2">Your Target / Base URL</label>
          <input type="url" id="targetUrl" value="https://your-site.com" 
            class="w-full p-4 border border-gray-300 rounded-2xl">
        </div>

        <button onclick="generateBacklinks()" 
          class="mt-8 w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-5 rounded-2xl text-xl">
          🚀 Generate Clean Backlink URLs
        </button>
      </div>

      <!-- OUTPUT -->
      <div class="bg-white rounded-2xl shadow-xl p-6 flex flex-col">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-semibold text-lg">📤 Generated Backlink URLs</h2>
          <span id="counter" class="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-sm font-bold">0 links</span>
        </div>
        
        <textarea id="output" class="box flex-1 w-full p-5 border border-gray-300 rounded-2xl bg-gray-50" readonly></textarea>
        
        <div class="flex gap-4 mt-6">
          <button onclick="copyOutput()" class="flex-1 bg-gray-900 text-white py-4 rounded-2xl font-semibold">Copy All Lines</button>
          <button onclick="clearOutput()" class="flex-1 bg-gray-200 py-4 rounded-2xl font-semibold">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function generateBacklinks() {
      const inputText = document.getElementById('inputUrls').value.trim();
      let target = document.getElementById('targetUrl').value.trim() || "https://your-site.com";

      if (!inputText) {
        alert("Please paste some opportunity URLs.");
        return;
      }

      const urls = inputText.split('\n').map(u => u.trim()).filter(u => u);
      let outputLines = [];

      urls.forEach(url => {
        // Clean full URL examples like your screenshots
        const variations = [
          `${target}?ref=${encodeURIComponent(url)}`,
          `${target}/?utm_source=${encodeURIComponent(url.replace('https://',''))}`,
          `${target}/backlink-from-${url.split('//')[1].replace(/\//g, '-')}`,
          `${target}/search?q=${encodeURIComponent(url)}`,
          `${target}?from=${encodeURIComponent(url)}`
        ];

        // Add one random clean variation per input line
        const link = variations[Math.floor(Math.random() * variations.length)];
        outputLines.push(link);
      });

      document.getElementById('output').value = outputLines.join('\n');
      document.getElementById('counter').textContent = `${outputLines.length} backlinks`;
    }

    function copyOutput() {
      const ta = document.getElementById('output');
      ta.select();
      document.execCommand('copy');
      alert("✅ Copied to clipboard!");
    }

    function clearOutput() {
      document.getElementById('output').value = '';
      document.getElementById('counter').textContent = '0 links';
    }
  </script>
</body>
</html>
